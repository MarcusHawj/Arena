name: Build Windows

# Build a downloadable Windows package on every push to main, and attach
# it to a GitHub Release whenever you push a version tag like v1.0.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}   # run every step inside the MSYS2 environment

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # Install MSYS2 plus the same toolchain/libraries used locally
      - name: Set up MSYS2 + toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-glew
            mingw-w64-x86_64-glm
            zip

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      # Collect the exe, its runtime DLLs, the README, and screenshots into
      # a clean folder. ldd lists the DLLs the exe actually links against;
      # we copy only the ones that live in the MinGW prefix (the system ones
      # are already on every Windows machine).
      - name: Package
        run: |
          mkdir -p dist/arena
          cp build/arena.exe dist/arena/
          for dll in $(ldd build/arena.exe | grep -i mingw64 | awk '{print $3}'); do
            cp "$dll" dist/arena/
          done
          cp README.md dist/arena/ 2>/dev/null || true
          cp menu.png screenshot.png dist/arena/ 2>/dev/null || true
          # A friendly note for players
          printf 'Double-click arena.exe to play.\nWASD to move, mouse to look, left-click to shoot, Esc to pause.\n' > dist/arena/HOW_TO_RUN.txt

      # Upload the folder as a build artifact you can download from the
      # Actions run page (available on every push).
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arena-windows
          path: dist/arena

      # When you push a tag like v1.0, also zip it and attach it to a
      # public Release so anyone can download it from the Releases page.
      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: cd dist && zip -r arena-windows.zip arena

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/arena-windows.zip
